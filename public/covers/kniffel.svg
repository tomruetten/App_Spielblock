<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D91B1B"/>
      <stop offset="100%" stop-color="#A00000"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGrad)"/>

  <!-- Diagonal decorative lines -->
  <line x1="-20" y1="260" x2="320" y2="-40" stroke="rgba(255,255,255,0.06)" stroke-width="40"/>
  <line x1="-20" y1="310" x2="320" y2="10" stroke="rgba(255,255,255,0.04)" stroke-width="30"/>

  <!-- Title -->
  <text x="150" y="78" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="white" letter-spacing="2">KNIFFEL</text>

  <!-- 5 Dice arranged nicely -->
  <!-- Die 1 - top left -->
  <rect x="28" y="100" width="72" height="72" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="64" cy="136" r="7" fill="#D91B1B"/>

  <!-- Die 2 - top center-left -->
  <rect x="114" y="100" width="72" height="72" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="135" cy="118" r="6" fill="#D91B1B"/>
  <circle cx="165" cy="154" r="6" fill="#D91B1B"/>

  <!-- Die 3 - top right -->
  <rect x="200" y="100" width="72" height="72" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="220" cy="117" r="6" fill="#D91B1B"/>
  <circle cx="236" cy="136" r="6" fill="#D91B1B"/>
  <circle cx="252" cy="155" r="6" fill="#D91B1B"/>

  <!-- Die 4 - bottom left -->
  <rect x="60" y="190" width="72" height="72" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="82" cy="208" r="6" fill="#D91B1B"/>
  <circle cx="110" cy="226" r="6" fill="#D91B1B"/>
  <circle cx="82" cy="244" r="6" fill="#D91B1B"/>
  <circle cx="110" cy="244" r="6" fill="#D91B1B"/>

  <!-- Die 5 - bottom right -->
  <rect x="168" y="190" width="72" height="72" rx="12" fill="white" filter="url(#shadow)"/>
  <circle cx="188" cy="207" r="5.5" fill="#D91B1B"/>
  <circle cx="210" cy="226" r="5.5" fill="#D91B1B"/>
  <circle cx="220" cy="226" r="5.5" fill="#D91B1B"/>
  <circle cx="188" cy="245" r="5.5" fill="#D91B1B"/>
  <circle cx="220" cy="245" r="5.5" fill="#D91B1B"/>
</svg>
