  <text x="167" y="74"  font-family="Arial, sans-serif" font-size="13" fill="#7C3AED" font-weight="600">Ben</text>
  <text x="228" y="74"  font-family="Arial, sans-serif" font-size="13" fill="#7C3AED" font-weight="600">Lisa</text>

  <text x="55"  y="100" font-family="Arial, sans-serif" font-size="14" fill="#333">12</text>
  <text x="167" y="100" font-family="Arial, sans-serif" font-size="14" fill="#333">8</text>
  <text x="228" y="100" font-family="Arial, sans-serif" font-size="14" fill="#333">15</text>

  <text x="55"  y="125" font-family="Arial, sans-serif" font-size="14" fill="#333">7</text>
