  <circle cx="16" cy="30"  r="3.5" fill="#9B72E8"/>
  <circle cx="16" cy="65"  r="8" fill="white" stroke="#9B72E8" stroke-width="2.5"/>
  <circle cx="16" cy="65"  r="3.5" fill="#9B72E8"/>
  <circle cx="16" cy="100" r="8" fill="white" stroke="#9B72E8" stroke-width="2.5"/>
  <circle cx="16" cy="100" r="3.5" fill="#9B72E8"/>
  <circle cx="16" cy="135" r="8" fill="white" stroke="#9B72E8" stroke-width="2.5"/>
  <circle cx="16" cy="135" r="3.5" fill="#9B72E8"/>
  <circle cx="16" cy="170" r="8" fill="white" stroke="#9B72E8" stroke-width="2.5"/>
  <circle cx="16" cy="170" r="3.5" fill="#9B72E8"/>
  <circle cx="16" cy="205" r="8" fill="white" stroke="#9B72E8" stroke-width="2.5"/>
  <circle cx="16" cy="205" r="3.5" fill="#9B72E8"/>
  <circle cx="16" cy="240" r="8" fill="white" stroke="#9B72E8" stroke-width="2.5"/>
  <circle cx="16" cy="240" r="3.5" fill="#9B72E8"/>
  <circle cx="16" cy="275" r="8" fill="white" stroke="#9B72E8" stroke-width="2.5"/>
  <circle cx="16" cy="275" r="3.5" fill="#9B72E8"/>

  <!-- Horizontal ruled lines -->
  <line x1="40" y1="55"  x2="286" y2="55"  stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="80"  x2="286" y2="80"  stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="105" x2="286" y2="105" stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="130" x2="286" y2="130" stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="155" x2="286" y2="155" stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="180" x2="286" y2="180" stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="205" x2="286" y2="205" stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="230" x2="286" y2="230" stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="40" y1="255" x2="286" y2="255" stroke="#D8C8F8" stroke-width="1.5"/>

  <!-- Vertical column separator -->
  <line x1="160" y1="50" x2="160" y2="270" stroke="#D8C8F8" stroke-width="1.5"/>
  <line x1="220" y1="50" x2="220" y2="270" stroke="#D8C8F8" stroke-width="1.5"/>

  <!-- Title -->
  <text x="163" y="32" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" text-anchor="middle" fill="#5B21B6">PUNKTE</text>
  <text x="163" y="48" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" text-anchor="middle" fill="#5B21B6">BLOCK</text>

