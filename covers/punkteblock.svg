  <text x="228" y="150" font-family="Arial, sans-serif" font-size="14" fill="#333">9</text>

  <!-- Total row -->
  <rect x="40" y="258" width="246" height="30" rx="6" fill="#7C3AED" opacity="0.12"/>
  <text x="55"  y="278" font-family="Arial, sans-serif" font-size="14" fill="#5B21B6" font-weight="700">39</text>
  <text x="167" y="278" font-family="Arial, sans-serif" font-size="14" fill="#5B21B6" font-weight="700">33</text>
  <text x="228" y="278" font-family="Arial, sans-serif" font-size="14" fill="#5B21B6" font-weight="700">30</text>
  <text x="100" y="278" font-family="Arial, sans-serif" font-size="10" fill="#5B21B6" font-weight="600">GESAMT</text>
