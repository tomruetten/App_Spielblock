<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bgP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="100%" stop-color="#FFF3D0"/>
    </linearGradient>
